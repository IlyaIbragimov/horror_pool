spring.datasource.url=jdbc:h2:mem:horror_pool_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

spring.app.jwtSecret=${SPRING_APP_JWT_SECRET:ZmFrZS10ZXN0LWp3dC1zZWNyZXQtZmFrZS10ZXN0LWp3dC1zZWNyZXQ=}
spring.app.jwtExpirationMs=86400000
spring.app.cookieName=horrorPoolCookieJwt
spring.app.cookieSecure=false

tmdb.api.base-url=https://api.themoviedb.org/3
tmdb.api.read-token=${TMDB_READ_TOKEN:dummy-test-token}
